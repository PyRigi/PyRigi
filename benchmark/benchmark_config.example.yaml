# Benchmark Configuration File Example
# 
# You can use this as a template for your own benchmark configurations.

# Target function to benchmark (required)
# Format: "path/to/file.py:function_name"
target: "pyrigi/graph/_rigidity/generic.py:is_min_rigid"

# Dataset directory containing .g6 graph files (required)
dataset: "benchmark/graph_store/min_rigid_test"

# Output file for benchmark results
# If relative, resolved to the benchmark/ directory.
# (default: benchmark/benchmark_results.json)
output: "benchmark_results.json"

# Minimum number of rounds per test case (default: 5).
# Lower values are suitable for complexity analysis (you care about the mean,
# not convergence of the distribution).
min_rounds: 5

# Warmup mode: auto | on | off (default: auto).
# 'off'  — no warmup, fastest; fine for complexity analysis.
# 'auto' — let pytest-benchmark decide; adds calibration overhead.
# 'on'   — always warm up; useful for cache-sensitive micro-benchmarks.
warmup: "auto"

# Number of warmup rounds when warmup is 'on' or 'auto' (default: 1).
# Has no effect when warmup='off'.
warmup_iterations: 10

# ===== HYBRID PARAMETER CONFIGURATION =====
# You can use EITHER or BOTH of the following sections:

# Option 1: Cartesian Product (auto-generate all combinations)
# All possible combinations of these parameters will be tested
cartesian_params:
  dim: [1]
  algorithm: ["graphic", "randomized"]

# Option 2: Explicit Configs (manual pairing to avoid invalid combinations)
# Specify exact parameter combinations to test
explicit_configs:
  - dim: 2
    algorithm: "sparsity"

# Notes:
# - cartesian_params generates: dim=1,algorithm=graphic AND dim=1,algorithm=randomized
# - explicit_configs adds: dim=2,algorithm=sparsity AND dim=2,algorithm=subgraph
# - Total: 4 configurations will be tested
# - You can use either section alone, or both together
